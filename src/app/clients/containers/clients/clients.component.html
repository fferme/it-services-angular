<mat-card>
  <mat-card-content>
    <mat-toolbar color="primary">
      Clients
      <div class="back-button">
        <button mat-raised-button color="warn" (click)="onBack()">Voltar</button>
      </div>
    </mat-toolbar>


    <div class="column-flex mat-elevation-z8">
      <app-clients-list
       *ngIf="clients$ | async as clients; else loading"
       [clients]="clients"
       (add)="onAdd()"
       (edit)="onEdit($event)"
       ></app-clients-list>

      <ng-template #loading>
        <div class="loading-spinner">
          <mat-spinner> </mat-spinner>
        </div>
      </ng-template>
    </div>



  </mat-card-content>
</mat-card>
