<div class="card container mt-4">
  <div class="card-body">
    <nav class="navbar bg-primary mb-2">
      <p class="fs-1 fw-bolder text-white">Clientes</p>
      <div aria-label="NavBar-Actions">
        <button type="button" class="btn btn-light" (click)="refresh()">Atualizar</button>
        <button type="button" class="btn btn-danger" (click)="onBack()">Voltar</button>
      </div>
    </nav>

    <div class="column-flex mat-elevation-z8">
      <app-clients-list *ngIf="clients$ | async as clients; else loading"
        [clients]="clients"
        (add)="onAdd()"
        (edit)="onEdit($event)"
        (delete)="onDelete($event)"
      ></app-clients-list>

      <ng-template #loading>
        <div class="d-flex align-items-center">
          <strong>Carregando cursos...</strong>
          <div class="spinner-border ms-auto" role="status" aria-hidden="true"></div>
        </div>
      </ng-template>


    </div>

  </div>
</div>
