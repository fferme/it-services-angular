<mat-card>
  <mat-card-content>
    <mat-toolbar color="primary">Clients</mat-toolbar>

  <div class="back-button">
    <button mat-raised-button color="warn" (click)="onBack()">Voltar</button>
  </div>

    <div class="column-flex mat-elevation-z8">
      <app-clients-list
       *ngIf="clients$ | async as clients; else loading"
       [clients]="clients"
       (add)="onAdd()"
       ></app-clients-list>

      <ng-template #loading>
        <div class="loading-spinner">
          <mat-spinner> </mat-spinner>
        </div>
      </ng-template>
    </div>

  </mat-card-content>
</mat-card>
