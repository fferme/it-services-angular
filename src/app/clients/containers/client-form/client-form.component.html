<div class="card card-centered" style="width: 35rem">

  <div class="card-header bg-primary">
    <nav class="navbar">
      <div class="container-fluid">
        <a class="navbar-brand text-white">Cadastro de Cliente</a>
      </div>
    </nav>
  </div>

  <div class="card-body justify-content-center">
  <form [formGroup]="clientForm">
      <div class="mb-3 full-width">
        <label for="name" class="form-label">Nome</label>
        <input type="text" class="form-control" id="name" formControlName="name">
      </div>

      <div class="mb-3 full-width">
        <label for="name" class="form-label">Celular</label>
        <input type="text" class="form-control" id="phoneNumber" formControlName="phoneNumber">
      </div>

      <div class="mb-3 full-width">
        <label for="neighbourhood" class="form-label">Bairro</label>
        <input type="text" class="form-control" id="neighbourhood" formControlName="neighbourhood">
      </div>

      <div class="mb-3 full-width">
        <label for="reference" class="form-label">Referência</label>
        <input type="text" class="form-control" id="reference" formControlName="reference">
      </div>
    </form>

    <div class="d-flex justify-content-center">
      <button type="button" class="btn btn-success" (click)="onSubmit()">Salvar</button>
      <button type="button" class="btn btn-danger" (click)="onCancel()">Cancelar</button>
    </div>


  </div>
</div>
